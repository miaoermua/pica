name: OpenWrt Rust Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  pull_request:
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - ".github/workflows/openwrt-rust-binaries.yml"

permissions:
  contents: read

jobs:
  test:
    name: test (workspace)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --workspace --locked -- --nocapture

  build:
    name: build (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Ensure Rust target installed
        run: rustup target add "${{ matrix.target }}"

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild

      - name: Build pica binaries
        run: |
          cargo zigbuild --release \
            --target "${{ matrix.target }}" \
            -p pica-pkg-cli \
            -p pica-pkg-pack

      - name: Prepare artifacts
        id: prepare_artifacts
        run: |
          mkdir -p dist
          if [ "${{ matrix.target }}" = "x86_64-unknown-linux-musl" ]; then
            arch=amd64
          else
            arch=arm64
          fi

          cp "target/${{ matrix.target }}/release/pica" "dist/pica.${arch}"
          cp "target/${{ matrix.target }}/release/pica-pack" "dist/pica-pack.${arch}"
          echo "arch=${arch}" >> "$GITHUB_OUTPUT"

      - name: Upload pica artifact
        uses: actions/upload-artifact@v4
        with:
          name: pica.${{ steps.prepare_artifacts.outputs.arch }}
          path: dist/pica.${{ steps.prepare_artifacts.outputs.arch }}

      - name: Upload pica-pack artifact
        uses: actions/upload-artifact@v4
        with:
          name: pica-pack.${{ steps.prepare_artifacts.outputs.arch }}
          path: dist/pica-pack.${{ steps.prepare_artifacts.outputs.arch }}

  release:
    name: Release assets
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: pica*
          merge-multiple: true

      - name: Publish GitHub Release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
